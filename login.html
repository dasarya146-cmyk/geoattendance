<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#006747" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Admin Login — Geo Attendance</title>
  <link rel="icon" type="image/png" href="./icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
  <style>
    /* ── Google Sign-In Button ─────────────────────────────────── */
    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 13px 20px;
      background: #ffffff;
      color: #3c4043;
      border: 1.5px solid rgba(0, 0, 0, 0.12);
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease, box-shadow 0.15s ease, transform 0.1s ease;
      position: relative;
      overflow: hidden;
    }
    .google-btn:hover:not(:disabled) {
      background: #f8f9fa;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
      transform: translateY(-1px);
    }
    .google-btn:active:not(:disabled) {
      transform: translateY(0);
      box-shadow: none;
    }
    .google-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }
    .google-btn .g-logo {
      flex-shrink: 0;
    }
    .google-btn-text {
      flex: 1;
      text-align: center;
    }

    /* ── Divider ───────────────────────────────────────────────── */
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 20px 0;
      color: var(--color-text-3);
      font-size: 0.78rem;
    }
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--color-border);
    }

    /* ── Access Denied state ───────────────────────────────────── */
    .denied-card {
      text-align: center;
      padding: 12px 0;
    }
    .denied-icon {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }
    .denied-title {
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--color-error, #f87171);
      margin-bottom: 6px;
    }
    .denied-sub {
      font-size: 0.82rem;
      color: var(--color-text-3);
      line-height: 1.5;
    }

    /* ── Loading spinner overlay ───────────────────────────────── */
    .auth-checking {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 20px 0;
      color: var(--color-text-2);
    }
    
    /* ── Form styling ──────────────────────────────────────────── */
    .form-group {
      margin-bottom: 15px;
      text-align: left;
    }
    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--color-text-2);
    }
    .form-control {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--color-border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.95rem;
      transition: all 0.2s ease;
      background: #fcfcfc;
    }
    .form-control:focus {
      outline: none;
      border-color: var(--color-accent);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(0, 103, 71, 0.1);
    }
  </style>
</head>
<body class="auth-page">

  <div class="bg-ambient" aria-hidden="true">
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>
  </div>

  <main class="auth-main" role="main">
    <div class="auth-card" id="auth-card">

      <!-- Logo -->
      <div class="auth-icon" aria-hidden="true">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
          <path d="M7 11V7a5 5 0 0 1 10 0v4" />
        </svg>
      </div>

      <h1 class="auth-title" id="login-title">Admin Login</h1>
      <p class="auth-subtitle">Geo Attendance System — GITAM Bhubaneswar</p>

      <!-- Session checking state -->
      <div id="state-checking" class="auth-checking">
        <div class="auth-spinner"></div>
        <span>Checking session...</span>
      </div>

      <!-- Sign-in state (hidden until check completes) -->
      <div id="state-signin" style="display:none;">
        <!-- Error / denied message -->
        <div class="auth-error" id="login-error" role="alert" style="display:none;margin-bottom:16px;"></div>

        <!-- Access denied card (shown after wrong account) -->
        <div id="denied-view" class="denied-card" style="display:none;">
          <div class="denied-icon">⛔</div>
          <div class="denied-title">Access Denied</div>
          <p class="denied-sub">
            Your account is not authorised to access this panel.<br>
            Please use the registered admin account.
          </p>
          <button id="try-again-btn" class="auth-btn" style="margin-top:18px;background:rgba(0,103,71,0.12);color:var(--color-accent);">
            Try a different account
          </button>
        </div>

        <!-- Login views -->
        <div id="signin-view">


          <form id="login-form">
            <div class="form-group">
              <label for="email">Email address</label>
              <input type="email" id="email" class="form-control" placeholder="admin@example.com" required>
            </div>
            <div class="form-group" style="margin-bottom:20px;">
              <label for="password">Password</label>
              <input type="password" id="password" class="form-control" placeholder="Enter password" required>
            </div>
            
            <button id="login-btn" class="google-btn" type="submit" aria-label="Log in">
              <span class="google-btn-text" id="login-btn-text" style="color: white; font-weight: 600;">Log In</span>
            </button>
          </form>

          <style>
            #login-btn {
              background: var(--color-accent);
              border: none;
            }
            #login-btn:hover:not(:disabled) {
              background: #008f62;
            }
          </style>

          <div class="auth-back" style="margin-top:20px;">
            <a href="./index.html" aria-label="Back to attendance form">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
              Back to Attendance Form
            </a>
          </div>
        </div>
      </div>

    </div>
  </main>

  <script>
  'use strict';

  // ── DOM refs ─────────────────────────────────────────────────────
  const stateChecking   = document.getElementById('state-checking');
  const stateSignin     = document.getElementById('state-signin');
  const loginError      = document.getElementById('login-error');
  const deniedView      = document.getElementById('denied-view');
  const signinView      = document.getElementById('signin-view');
  const trAgainBtn      = document.getElementById('try-again-btn');
  const loginForm       = document.getElementById('login-form');
  const emailInput      = document.getElementById('email');
  const passwordInput   = document.getElementById('password');

  // Hardcoded Admin Credentials
  const ADMIN_EMAIL = 'dasarya146@gmail.com';
  const ADMIN_PASS = 'Arya@2005';

  // ── Initial Check ────────────────────────────────────────────────
  if (localStorage.getItem('admin_logged_in') === 'true') {
    window.location.replace('./admin.html');
  } else {
    // Show login form
    stateChecking.style.display = 'none';
    stateSignin.style.display   = '';
    signinView.style.display    = '';
  }

  // ── UI state helpers ─────────────────────────────────────────────
  function showSignIn() {
    stateChecking.style.display = 'none';
    stateSignin.style.display   = '';
    deniedView.style.display    = 'none';
    signinView.style.display    = '';
    loginError.style.display    = 'none';
  }

  function showError(msg) {
    loginError.textContent   = msg;
    loginError.style.display = 'block';
  }

  // ── Form Submission ──────────────────────────────────────────────
  loginForm.addEventListener('submit', (e) => {
    e.preventDefault();
    loginError.style.display = 'none';
    
    const email = emailInput.value.trim();
    const password = passwordInput.value;
    
    if (email === ADMIN_EMAIL && password === ADMIN_PASS) {
      localStorage.setItem('admin_logged_in', 'true');
      window.location.replace('./admin.html');
    } else {
      showError('Invalid credentials');
    }
  });

  // ── "Try a different account" ────────────────────────────────────
  trAgainBtn.addEventListener('click', () => {
    showSignIn();
  });
  </script>
</body>
</html>
